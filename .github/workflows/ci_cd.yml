name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      - name: Lint code
        run: cd final_code && npm run lint

      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Copy Compose File lên Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "final_code/docker-compose.yml,final_code/prometheus.yml" 
          target: "/home/${{ secrets.SERVER_USER }}/app/" 

      - name: Deploy Blue-Green (Tuân thủ No-Latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/app/final_code
            
            # 1. LẤY SỐ LƯỢNG REPLICAS VÀ XỬ LÝ CHUỖI RỖNGG
            GREEN_REPLICAS=$(docker service ls --filter name=my-stack_app-green --format "{{.Replicas}}" | awk -F'/' '{print $1}')
            # Nếu GREEN_REPLICAS rỗng, tự động gán bằng 0 để tránh lỗi Bash
            GREEN_REPLICAS=${GREEN_REPLICAS:-0} 
            
            if [ "$GREEN_REPLICAS" -gt "0" ]; then
                echo "🟢 Green đang chạy -> Triển khai lên 🔵 Blue"
                TARGET="blue"
                OLD="green"
            else
                echo "🔵 Blue đang chạy (hoặc lần đầu) -> Triển khai lên 🟢 Green"
                TARGET="green"
                OLD="blue"
            fi

            NEW_TAG="${{ github.sha }}"

            # LẤY TAG CŨ ĐỂ TUÂN THỦ NO-LATEST
            OLD_IMAGE=$(docker service ls --filter name=my-stack_app-$OLD --format "{{.Image}}" | head -n 1)
            OLD_TAG=$(echo $OLD_IMAGE | awk -F':' '{print $2}' | awk -F'@' '{print $1}')
            
            # Nếu không tìm thấy tag cũ (lần đầu deploy), dùng tạm tag mới
            if [ -z "$OLD_TAG" ]; then
                OLD_TAG=$NEW_TAG
            fi
            
            echo "Tag mới: $NEW_TAG | Tag cũ duy trì: $OLD_TAG"

            # 2. KHẮC PHỤC LỖI .ENV: Export trực tiếp biến môi trường
            if [ "$TARGET" == "blue" ]; then
                export BLUE_IMAGE_TAG=$NEW_TAG
                export GREEN_IMAGE_TAG=$OLD_TAG
                export BLUE_REPLICAS=3
                export GREEN_REPLICAS=3
            else
                export GREEN_IMAGE_TAG=$NEW_TAG
                export BLUE_IMAGE_TAG=$OLD_TAG
                export GREEN_REPLICAS=3
                export BLUE_REPLICAS=3
            fi

            # Deploy lần 1: Bật service mới lên (Live song song)
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth
            
            # Đợi 30s để service mới kịp kết nối MongoDB và Healthy
            sleep 30

            # 3. Tắt service cũ (Thu hồi tài nguyên)
            if [ "$TARGET" == "blue" ]; then
                export GREEN_REPLICAS=0
            else
                export BLUE_REPLICAS=0
            fi
            
            # Deploy lần 2: Tắt service cũ đi
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth