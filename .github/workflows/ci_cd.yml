name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # Dependency Management & Caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      # Code Quality
      - name: Lint code
        run: cd final_code && npm run lint

      # 🔥 1. SECURITY SCAN - APPLICATION (FAIL nếu có lỗi thật)
      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # Build Docker Image
      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      # 🔥 2. SECURITY SCAN - IMAGE (KHÔNG FAIL vì base image)
      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'   # ⚠️ KHÔNG FAIL
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Push Docker Image
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # 1. Copy file docker-compose.yml lên Server AWS
      - name: Copy Compose File lên Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "final_code/docker-compose.yml" 
          target: "/home/${{ secrets.SERVER_USER }}/app/" 

      # 2. Thực hiện Blue-Green Deployment qua SSH
      - name: Deploy Blue-Green lên AWS Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục chứa code
            cd /home/${{ secrets.SERVER_USER }}/app/final_code
            
            echo "📦 Đăng nhập Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "🔍 Kiểm tra trạng thái môi trường hiện tại..."
            # Lấy số lượng replicas hiện tại của Green, mặc định là 0 nếu chưa có
            GREEN_STATUS=$(docker service ls --filter name=my-stack_app-green --format "{{.Replicas}}" | cut -d'/' -f1)
            CURRENT_GREEN_REPLICAS=${GREEN_STATUS:-0}
            
            NEW_TAG="${{ github.sha }}"

            if [ "$CURRENT_GREEN_REPLICAS" -ge "1" ]; then
                echo "🟢 Green đang LIVE -> Target deploy sẽ là 🔵 Blue"
                TARGET_COLOR="blue"
                # Cấu hình file .env cho bước 1: Cả 2 cùng chạy
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=latest" >> .env
                echo "BLUE_REPLICAS=3" >> .env
                echo "GREEN_REPLICAS=3" >> .env
            else
                echo "🔵 Blue đang LIVE (hoặc chưa có) -> Target deploy sẽ là 🟢 Green"
                TARGET_COLOR="green"
                # Cấu hình file .env cho bước 1: Cả 2 cùng chạy
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=latest" >> .env
                echo "GREEN_REPLICAS=3" >> .env
                echo "BLUE_REPLICAS=3" >> .env
            fi

            echo "🚀 [BƯỚC 1/2] Đang triển khai phiên bản mới song song với phiên bản cũ..."
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false

            echo "⏳ Chờ 30 giây để phiên bản mới khởi động hoàn tất..."
            sleep 30

            echo "✂️ [BƯỚC 2/2] Chuyển toàn bộ traffic sang phiên bản mới và tắt bản cũ..."
            if [ "$TARGET_COLOR" == "blue" ]; then
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=latest" >> .env
                echo "BLUE_REPLICAS=3" >> .env
                echo "GREEN_REPLICAS=0" >> .env
            else
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=latest" >> .env
                echo "GREEN_REPLICAS=3" >> .env
                echo "BLUE_REPLICAS=0" >> .env
            fi

            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false
            
            echo "🧹 Dọn dẹp file cấu hình tạm..."
            rm .env
            
            echo "✅ BLUE-GREEN DEPLOYMENT THÀNH CÔNG!"
            docker service ls