name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      - name: Lint code
        run: cd final_code && npm run lint

      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Copy Compose File lên Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "final_code/docker-compose.yml" 
          target: "/home/${{ secrets.SERVER_USER }}/app/" 

      - name: Deploy Blue-Green (Tuân thủ No-Latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_HOST }}/app/final_code
            
            # 1. Lấy Image thực tế từ Swarm
            RAW_BLUE=$(docker service inspect my-stack_app-blue --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || echo "")
            RAW_GREEN=$(docker service inspect my-stack_app-green --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || echo "")

            # 2. Trích xuất Tag (Xử lý chuỗi an toàn)
            # Lấy Tag thực tế, nếu không có (lần đầu deploy) thì dùng Tag mới luôn
            GET_BLUE_TAG=$(docker service inspect my-stack_app-blue --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' | cut -d':' -f2 || echo "")
            CURRENT_BLUE_TAG=${GET_BLUE_TAG:-${{ github.sha }}}

            # Tương tự cho Green
            GET_GREEN_TAG=$(docker service inspect my-stack_app-green --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' | cut -d':' -f2 || echo "")
            CURRENT_GREEN_TAG=${GET_GREEN_TAG:-${{ github.sha }}}
            
            NEW_TAG="${{ github.sha }}"
            # QUAN TRỌNG: Nếu không thấy tag cũ, dùng luôn NEW_TAG để không bị trống
            CURRENT_BLUE_TAG=${GET_BLUE_TAG:-$NEW_TAG}
            CURRENT_GREEN_TAG=${GET_GREEN_TAG:-$NEW_TAG}

            # 3. Kiểm tra Replicas để xác định Target
            GREEN_COUNT=$(docker service ls --filter name=my-stack_app-green --format "{{.Replicas}}" | awk 'NR>1 {split($4,a,"/"); print a[1]}')
            CURRENT_GREEN_REPLICAS=${GREEN_COUNT:-0}

            if [ "$CURRENT_GREEN_REPLICAS" -ge "1" ]; then
                echo "🟢 Green đang LIVE -> Target: 🔵 Blue"
                TARGET_COLOR="blue"
                LIVE_TAG=$CURRENT_GREEN_TAG
            else
                echo "🔵 Blue đang LIVE -> Target: 🟢 Green"
                TARGET_COLOR="green"
                LIVE_TAG=$CURRENT_BLUE_TAG
            fi

            # --- BƯỚC 1: TRIỂN KHAI SONG SONG ---
            echo "BLUE_IMAGE_TAG=${TARGET_COLOR=="blue" ? $NEW_TAG : $LIVE_TAG}" > .env # Logic giả lập
            # Để an toàn, ghi đè tường minh:
            if [ "$TARGET_COLOR" == "blue" ]; then
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=$LIVE_TAG" >> .env
            else
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=$LIVE_TAG" >> .env
            fi
            echo "BLUE_REPLICAS=3" >> .env
            echo "GREEN_REPLICAS=3" >> .env
            
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false
            sleep 30

            # --- BƯỚC 2: TẮT BẢN CŨ ---
            if [ "$TARGET_COLOR" == "blue" ]; then
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=$LIVE_TAG" >> .env
                echo "BLUE_REPLICAS=3" >> .env
                echo "GREEN_REPLICAS=0" >> .env
            else
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=$LIVE_TAG" >> .env
                echo "GREEN_REPLICAS=3" >> .env
                echo "BLUE_REPLICAS=0" >> .env
            fi
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false
            docker service ls