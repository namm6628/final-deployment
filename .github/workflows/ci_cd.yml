name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # Dependency Management & Caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      # Code Quality
      - name: Lint code
        run: cd final_code && npm run lint

      # 🔥 1. SECURITY SCAN - APPLICATION (FAIL nếu có lỗi thật)
      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # Build Docker Image
      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      # 🔥 2. SECURITY SCAN - IMAGE (KHÔNG FAIL vì base image)
      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'   # ⚠️ KHÔNG FAIL
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Push Docker Image
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy lên AWS Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "📦 Pull image mới..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

            echo "🌐 Kiểm tra network..."
            docker network inspect my-network >/dev/null 2>&1 || \
            docker network create --driver overlay my-network

            echo "🍃 Kiểm tra Mongo service..."
            docker service ls | grep mongo || \
            docker service create \
              --name mongo \
              --network my-network \
              --replicas 1 \
              mongo

            echo "⏳ Đợi Mongo..."
            sleep 10

            echo "🚀 Update service..."
            docker service update \
              --image ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} \
              --env-add MONGO_URI="mongodb://mongo:27017/products_db" \
              --update-delay 10s \
              --update-parallelism 1 \
              --with-registry-auth \
              my-final-app_app

            echo "📊 Status..."
            docker service ps my-final-app_app