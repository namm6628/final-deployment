name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      - name: Lint code
        run: cd final_code && npm run lint

      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Copy Compose File lên Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "final_code/docker-compose.yml" 
          target: "/home/${{ secrets.SERVER_USER }}/app/" 

      - name: Deploy Blue-Green (Tuân thủ No-Latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_HOST }}/app/final_code
            
            # 1. Kiểm tra xem Green đang chạy hay Blue đang chạy
            # Chúng ta dùng "my-stack_app-green" vì Docker Swarm tự thêm tiền tố stack
            GREEN_REPLICAS=$(docker service ls --filter name=my-stack_app-green --format "{{.Replicas}}" | awk -F'/' '{print $1}' || echo "0")
            
            if [ "$GREEN_REPLICAS" -gt "0" ]; then
                echo "🟢 Green đang chạy -> Triển khai lên 🔵 Blue"
                TARGET="blue"
                OLD="green"
            else
                echo "🔵 Blue đang chạy (hoặc lần đầu) -> Triển khai lên 🟢 Green"
                TARGET="green"
                OLD="blue"
            fi

            # 2. Bước 1: Bật service mới lên (Live song song)
            # Gán tag mới cho TARGET, giữ tag cũ cho OLD
            NEW_TAG="${{ github.sha }}"
            
            # Ghi file .env để Docker Compose đọc
            if [ "$TARGET" == "blue" ]; then
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=latest" >> .env # Hoặc tag hiện tại
                echo "BLUE_REPLICAS=3" >> .env
                echo "GREEN_REPLICAS=3" >> .env
            else
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=latest" >> .env
                echo "GREEN_REPLICAS=3" >> .env
                echo "BLUE_REPLICAS=3" >> .env
            fi

            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth
            
            # Đợi 30s để service mới kịp kết nối MongoDB và Healthy
            sleep 30

            # 3. Bước 2: Tắt service cũ
            if [ "$TARGET" == "blue" ]; then
                echo "GREEN_REPLICAS=0" >> .env
            else
                echo "BLUE_REPLICAS=0" >> .env
            fi
            
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth