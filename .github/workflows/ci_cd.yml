name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # Dependency Management & Caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      # Code Quality
      - name: Lint code
        run: cd final_code && npm run lint

      # 🔥 1. SECURITY SCAN - APPLICATION (FAIL nếu có lỗi thật)
      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # Build Docker Image
      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      # 🔥 2. SECURITY SCAN - IMAGE (KHÔNG FAIL vì base image)
      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'   # ⚠️ KHÔNG FAIL
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Push Docker Image
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # 1. Copy file docker-compose.yml lên Server AWS
      - name: Copy Compose File lên Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "final_code/docker-compose.yml" 
          target: "/home/${{ secrets.SERVER_USER }}/app/" 

      # 2. Thực hiện Blue-Green Deployment qua SSH
      - name: Deploy Blue-Green (Tuân thủ No-Latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/app/final_code
            
            echo "📦 Đăng nhập Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 1. Lấy Tag đang chạy của Blue và Green (Nếu chưa có thì dùng tạm Tag mới nhất vừa build)
            # Lệnh này lấy tag từ image đang chạy, ví dụ: "nbao1502/final:abc123" -> lấy "abc123"
            GET_BLUE_TAG=$(docker service inspect my-stack_app-blue --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' | cut -d':' -f2 || echo "")
            GET_GREEN_TAG=$(docker service inspect my-stack_app-green --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' | cut -d':' -f2 || echo "")
            
            # 2. Xác định Tag hiện tại (Ưu tiên tag thực tế, nếu rỗng thì dùng tag của commit hiện tại)
            CURRENT_BLUE_TAG=${GET_BLUE_TAG:-${{ github.sha }}}
            CURRENT_GREEN_TAG=${GET_GREEN_TAG:-${{ github.sha }}}
            NEW_TAG="${{ github.sha }}"

            # 3. Kiểm tra xem màu nào đang có Replicas > 0
            GREEN_COUNT=$(docker service ls --filter name=my-stack_app-green --format "{{.Replicas}}" | cut -d'/' -f1)
            CURRENT_GREEN_REPLICAS=${GREEN_COUNT:-0}

            if [ "$CURRENT_GREEN_REPLICAS" -ge "1" ]; then
                echo "🟢 Green đang LIVE -> Target là 🔵 Blue"
                TARGET_COLOR="blue"
                # Blue nhận bản mới, Green giữ nguyên bản cũ của nó (không dùng latest)
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=$CURRENT_GREEN_TAG" >> .env
                echo "BLUE_REPLICAS=3" >> .env
                echo "GREEN_REPLICAS=3" >> .env
            else
                echo "🔵 Blue đang LIVE -> Target là 🟢 Green"
                TARGET_COLOR="green"
                # Green nhận bản mới, Blue giữ nguyên bản cũ của nó
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=$CURRENT_BLUE_TAG" >> .env
                echo "GREEN_REPLICAS=3" >> .env
                echo "BLUE_REPLICAS=3" >> .env
            fi

            echo "🚀 [BƯỚC 1/2] Deploy song song (Cả 2 cùng chạy)..."
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false

            echo "⏳ Đợi 30s để phiên bản mới sống dậy..."
            sleep 30

            echo "✂️ [BƯỚC 2/2] Tắt phiên bản cũ..."
            if [ "$TARGET_COLOR" == "blue" ]; then
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=$CURRENT_GREEN_TAG" >> .env
                echo "BLUE_REPLICAS=3" >> .env
                echo "GREEN_REPLICAS=0" >> .env
            else
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=$CURRENT_BLUE_TAG" >> .env
                echo "GREEN_REPLICAS=3" >> .env
                echo "BLUE_REPLICAS=0" >> .env
            fi

            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false
            rm .env
            echo "✅ Hoàn tất Blue-Green theo chuẩn explicit version tags!"