name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # Dependency Management & Caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      # Code Quality
      - name: Lint code
        run: cd final_code && npm run lint

      # 🔥 1. SECURITY SCAN - APPLICATION (FAIL nếu có lỗi thật)
      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # Build Docker Image
      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      # 🔥 2. SECURITY SCAN - IMAGE (KHÔNG FAIL vì base image)
      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'   # ⚠️ KHÔNG FAIL
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Push Docker Image
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # 1. Copy file từ thư mục final_code lên Server AWS
      - name: Copy Compose File lên Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 📍 ĐƯỜNG DẪN MỚI NẰM Ở ĐÂY
          source: "final_code/docker-compose.yml" 
          target: "/home/${{ secrets.SERVER_USER }}/app/" 

      # 2. Đăng nhập SSH và Deploy Stack
      - name: Deploy lên AWS Docker Swarm bằng Stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 📍 DI CHUYỂN VÀO ĐÚNG THƯ MỤC TRÊN SERVER TRƯỚC KHI DEPLOY
            # Action SCP ở trên sẽ tự động tạo thư mục final_code bên trong app/
            cd /home/${{ secrets.SERVER_USER }}/app/final_code
            
            echo "📦 Đăng nhập Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            echo "🚀 Cập nhật biến môi trường và Deploy Stack..."
            export IMAGE_TAG=${{ github.sha }}
            
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth
            
            echo "📊 Trạng thái các service..."
            docker service ls