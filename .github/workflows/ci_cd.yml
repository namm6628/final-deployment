name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # Yêu cầu: Dependency Management and Caching
      - name: Cài đặt Node.js & Lưu Cache
        uses: actions/setup-node@v4
        with:
          node-version: '18' 
          cache: 'npm'
          cache-dependency-path: 'final_code/package-lock.json'

      - name: Tải thư viện (Dependencies)
        run: cd final_code && npm install

      # Yêu cầu: Code Quality and Linting
      - name: Kiểm tra chất lượng code
        run: cd final_code && npm run lint

      # Yêu cầu: Container Image Build với Explicit Tags (Commit Hash)
      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      # Yêu cầu: Security Scanning (Dùng Trivy)
      - name: Quét bảo mật Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '1' 
          trivyignores: 'final_code/.trivyignore' # Đọc danh sách bỏ qua từ thư mục gốc
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Yêu cầu: Registry Push (Đẩy lên Docker Hub)
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Đẩy Image lên Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test # Bắt buộc đợi CI chạy xong và thành công
    runs-on: ubuntu-latest

    steps:
      - name: Deploy lên AWS Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Kéo Image mới nhất từ Docker Hub..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}
            
            echo "Cập nhật dịch vụ Docker Swarm..."
            # LƯU Ý: Bạn cần thay 'ten_dich_vu_cua_ban' bằng tên Service thực tế trong Swarm
            docker service update --image ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} my-final-app_app