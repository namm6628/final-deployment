name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài dependencies (clean install)
        run: cd final_code && npm ci

      - name: Lint code
        run: cd final_code && npm run lint

      - name: Scan Application (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'final_code'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      - name: Scan Docker Image (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Copy Compose File lên Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "final_code/docker-compose.yml" 
          target: "/home/${{ secrets.SERVER_USER }}/app/" 

      - name: Deploy Blue-Green (Tuân thủ No-Latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/app/final_code
            
            echo "📦 Đăng nhập Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 1. Lấy thông tin Image hiện tại từ Swarm (Fix lỗi cắt chuỗi rỗng)
            RAW_BLUE=$(docker service inspect my-stack_app-blue --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || echo "")
            RAW_GREEN=$(docker service inspect my-stack_app-green --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || echo "")

            # Trích xuất tag sau dấu ":" và đảm bảo không lấy giá trị rỗng
            GET_BLUE_TAG=$(echo $RAW_BLUE | awk -F: '{print $2}' | awk -F@ '{print $1}')
            GET_GREEN_TAG=$(echo $RAW_GREEN | awk -F: '{print $2}' | awk -F@ '{print $1}')
            
            # 2. Gán giá trị mặc định nếu là lần đầu deploy (tránh lỗi invalid reference format)
            NEW_TAG="${{ github.sha }}"
            CURRENT_BLUE_TAG=${GET_BLUE_TAG:-$NEW_TAG}
            CURRENT_GREEN_TAG=${GET_GREEN_TAG:-$NEW_TAG}

            # 3. Kiểm tra môi trường Live dựa trên Replicas
            GREEN_STATUS=$(docker service ls --filter name=my-stack_app-green --format "{{.Replicas}}" | cut -d'/' -f1)
            CURRENT_GREEN_REPLICAS=${GREEN_STATUS:-0}

            echo "📊 Current Green Replicas: $CURRENT_GREEN_REPLICAS"

            if [ "$CURRENT_GREEN_REPLICAS" -ge "1" ]; then
                echo "🟢 Green đang LIVE -> Target: 🔵 Blue"
                TARGET_COLOR="blue"
                LIVE_TAG=$CURRENT_GREEN_TAG
            else
                echo "🔵 Blue đang LIVE -> Target: 🟢 Green"
                TARGET_COLOR="green"
                LIVE_TAG=$CURRENT_BLUE_TAG
            fi

            # --- BƯỚC 1: TRIỂN KHAI SONG SONG ---
            echo "🚀 [1/2] Đang bật bản mới song song với bản cũ..."
            if [ "$TARGET_COLOR" == "blue" ]; then
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=$LIVE_TAG" >> .env
            else
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=$LIVE_TAG" >> .env
            fi
            echo "BLUE_REPLICAS=3" >> .env
            echo "GREEN_REPLICAS=3" >> .env
            
            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false

            echo "⏳ Chờ 30s để kiểm tra sức khỏe..."
            sleep 30

            # --- BƯỚC 2: TẮT BẢN CŨ ---
            echo "✂️ [2/2] Đang ngắt kết nối bản cũ..."
            if [ "$TARGET_COLOR" == "blue" ]; then
                echo "BLUE_IMAGE_TAG=$NEW_TAG" > .env
                echo "GREEN_IMAGE_TAG=$LIVE_TAG" >> .env
                echo "BLUE_REPLICAS=3" >> .env
                echo "GREEN_REPLICAS=0" >> .env
            else
                echo "GREEN_IMAGE_TAG=$NEW_TAG" > .env
                echo "BLUE_IMAGE_TAG=$LIVE_TAG" >> .env
                echo "GREEN_REPLICAS=3" >> .env
                echo "BLUE_REPLICAS=0" >> .env
            fi

            docker stack deploy -c docker-compose.yml my-stack --with-registry-auth --detach=false
            
            echo "✅ Blue-Green Deployment thành công!"
            docker service ls