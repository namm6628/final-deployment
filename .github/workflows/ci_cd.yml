name: Continuous Integration and Continuous Delivery (CI/CD)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # Dependency Management and Caching
      - name: Cài đặt Node.js & Lưu Cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'  # ✅ fix lỗi path

      - name: Tải thư viện (Dependencies)
        run: cd final_code && npm ci   # ✅ chuẩn CI

      # Code Quality and Linting
      - name: Kiểm tra chất lượng code
        run: cd final_code && npm run lint

      # Build Docker Image
      - name: Build Docker Image
        run: cd final_code && docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} .

      # Security Scanning (Trivy)
      - name: Quét bảo mật Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'   # ⚠️ đổi để tránh fail do HIGH

      # Push Docker Image
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Đẩy Image lên Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

  deploy:
    name: Continuous Delivery (CD)   # ✅ fix indent
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy lên AWS Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "📦 Pull image mới..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }}

            echo "🌐 Kiểm tra network..."
            docker network inspect my-network >/dev/null 2>&1 || \
            docker network create --driver overlay my-network

            echo "🍃 Kiểm tra Mongo service..."
            docker service ls | grep mongo || \
            docker service create \
              --name mongo \
              --network my-network \
              --replicas 1 \
              mongo

            echo "⏳ Đợi Mongo khởi động..."
            sleep 10

            echo "🚀 Deploy app service..."
            docker service update \
              --image ${{ secrets.DOCKER_USERNAME }}/final:${{ github.sha }} \
              --env-add MONGO_URI="mongodb://mongo:27017/products_db" \
              --update-delay 10s \
              --update-parallelism 1 \
              --with-registry-auth \
              my-final-app_app

            echo "📊 Kiểm tra trạng thái..."
            docker service ps my-final-app_app