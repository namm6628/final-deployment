version: '3.8'

services:
  # 1. CỔNG GÁC TRAEFIK
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Chuyển hướng tự động HTTP sang HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Cấu hình xin chứng chỉ Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=nbao1502@gmail.com" # <--- 1. ĐỔI THÀNH EMAIL THẬT CỦA BẠN
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/letsencrypt"

    deploy:
      placement:
        constraints:
          - node.role == manager # Traefik BẮT BUỘC phải nằm ở Manager

  # 🔵 PHÂN KHU BLUE
  app-blue:
    image: nbao1502/final:${BLUE_IMAGE_TAG:-latest}
    deploy:
      replicas: ${BLUE_REPLICAS:-3} # Mặc định cho Blue chạy trước
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.app-blue.rule=Host(`namcloud.xyz`)"
        - "traefik.http.routers.app-blue.entrypoints=websecure"
        - "traefik.http.routers.app-blue.tls.certresolver=myresolver"
        - "traefik.http.services.app-blue.loadbalancer.server.port=3000"

  # 🟢 PHÂN KHU GREEN
  app-green:
    image: nbao1502/final:${GREEN_IMAGE_TAG:-latest}
    deploy:
      replicas: ${GREEN_REPLICAS:-0} # Mặc định Green nghỉ
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.app-green.rule=Host(`namcloud.xyz`)"
        - "traefik.http.routers.app-green.entrypoints=websecure"
        - "traefik.http.routers.app-green.tls.certresolver=myresolver"
        - "traefik.http.services.app-green.loadbalancer.server.port=3000"

  visualizer:
    image: dockersamples/visualizer:stable

    ports:
      - "8080:8080"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  default:
    driver: overlay

volumes:
  traefik-certs: