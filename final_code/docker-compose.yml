version: '3.8'

services:
  # 🍃 DATABASE (Lưu trữ dữ liệu an toàn, không bị mất khi restart)
  mongodb:
    image: mongo:7.0
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    deploy:
      placement:
        constraints: [node.role == manager]

  # 1. CỔNG GÁC TRAEFIK (Tự động cấp SSL HTTPS)
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=nbao1502@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/letsencrypt"
    networks:
      - app-network
    deploy:
      placement:
        constraints:
          - node.role == manager

  # 🔵 PHÂN KHU BLUE (Zero-downtime Deployment)
  app-blue:
    image: nbao1502/final:${BLUE_IMAGE_TAG}
    environment:
      - MONGO_URI=mongodb://mongodb:27017/products_db
    networks:
      - app-network
    deploy:
      replicas: ${BLUE_REPLICAS:-3}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.app-blue.rule=Host(`namcloud.xyz`)"
        - "traefik.http.routers.app-blue.entrypoints=websecure"
        - "traefik.http.routers.app-blue.tls.certresolver=myresolver"
        - "traefik.http.services.app-blue.loadbalancer.server.port=3000"

  # 🟢 PHÂN KHU GREEN (Zero-downtime Deployment)
  app-green:
    image: nbao1502/final:${GREEN_IMAGE_TAG}
    environment:
      - MONGO_URI=mongodb://mongodb:27017/products_db
    networks:
      - app-network
    deploy:
      replicas: ${GREEN_REPLICAS:-0}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.app-green.rule=Host(`namcloud.xyz`)"
        - "traefik.http.routers.app-green.entrypoints=websecure"
        - "traefik.http.routers.app-green.tls.certresolver=myresolver"
        - "traefik.http.services.app-green.loadbalancer.server.port=3000"

  # 👁️ VISUALIZER (Xem trực quan các node)
  visualizer:
    image: dockersamples/visualizer:stable
    ports:
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - app-network
    deploy:
      placement:
        constraints: [node.role == manager]

  # ==========================================
  # PHẦN GIÁM SÁT HỆ THỐNG (MỤC 4.4)
  # ==========================================

  # 📊 PROMETHEUS - Lưu trữ Metrics (Chỉ chạy trên Manager)
  prometheus:
    image: prom/prometheus:v2.50.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - app-network
    deploy:
      placement:
        constraints: [node.role == manager]

  # 📈 GRAFANA - Giao diện biểu đồ (Được Traefik bảo vệ bằng HTTPS)
  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - grafana_data:/var/lib/grafana
    configs:                                                               # Thêm dòng này
      - source: grafana_datasource                                         # Thêm dòng này
        target: /etc/grafana/provisioning/datasources/prometheus.yml
    networks:
      - app-network
    deploy:
      placement:
        constraints: [node.role == manager]
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`monitor.namcloud.xyz`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=myresolver"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # 🖥️ NODE EXPORTER - Đo lường phần cứng máy chủ
  node-exporter:
    image: prom/node-exporter:v1.7.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    networks:
      - app-network
    deploy:
      mode: global # Quan trọng: Ép mọi Node (EC2) đều phải chạy để đo CPU/RAM

  # 🐳 CADVISOR - Đo lường thông số từng Container
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app-network
    deploy:
      mode: global # Quan trọng: Ép mọi Node đều phải chạy để quét container

# ==========================================
# KHAI BÁO NETWORK, VOLUMES & CONFIGS
# ==========================================
networks:
  app-network:
    driver: overlay

volumes:
  traefik-certs:
  mongo-data:
  prometheus_data:
  grafana_data:

configs:
  prometheus_config:
    file: ./prometheus.yml # Nhớ tạo file này cùng thư mục với docker-compose.yml
  grafana_datasource:                 # Thêm dòng này
    file: ./grafana_datasource.yml